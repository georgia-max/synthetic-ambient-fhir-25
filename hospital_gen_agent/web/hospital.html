<!DOCTYPE html>
<!--
  Hospital Generative Agents — minimal grid replayer (R2)
  =======================================================
  A single-file, dependency-free (no frameworks, no CDN) vanilla-JS canvas
  replayer for the hospital vertical slice. It fetches three SIBLING files from
  the directory this HTML is served from and animates the baked replay:

      world.json            floor plan (tiles, rooms, objects)
      meta.json             sim metadata (start date, clock, sec_per_step, cast)
      master_movement.json  delta-compressed per-step persona states

  HOW TO SERVE (file:// fetch is blocked by browsers — you MUST use a server):

      /Users/georgia/Desktop/synthetic-ambient-fhir-25/.venv/bin/python -m http.server

  run that from THIS directory (hospital_gen_agent/web/), then open
      http://localhost:8000/hospital.html

  If master_movement.json is missing, a friendly message explains how to bake it
  (run_slice.py) and how to serve the folder. See the plans for the data
  contracts (SUBPLAN_B_vertical_slice.md).
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hospital Generative Agents — Replay</title>
<style>
  :root {
    --bg: #0e1116;
    --panel: #161b22;
    --panel-2: #1c232d;
    --ink: #e6edf3;
    --muted: #9aa7b4;
    --accent: #4ea1ff;
    --border: #2a323c;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--ink);
    font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  #app { display: flex; flex-direction: column; height: 100%; }
  header {
    display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
    padding: 10px 16px; background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; letter-spacing: .2px; }
  .clock {
    font-variant-numeric: tabular-nums; font-size: 15px;
    background: var(--panel-2); border: 1px solid var(--border);
    padding: 5px 10px; border-radius: 6px; color: var(--accent);
  }
  .controls { display: flex; align-items: center; gap: 10px; margin-left: auto; flex-wrap: wrap; }
  button, select {
    background: var(--panel-2); color: var(--ink);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 12px; font-size: 13px; cursor: pointer;
  }
  button:hover, select:hover { border-color: var(--accent); }
  button:disabled { opacity: .5; cursor: default; }
  .step-label { color: var(--muted); font-variant-numeric: tabular-nums; min-width: 92px; }
  main { flex: 1; display: flex; overflow: hidden; }
  #stage {
    flex: 1; overflow: auto; display: flex; align-items: flex-start;
    justify-content: center; padding: 16px; background:
      repeating-linear-gradient(45deg, #0c0f14 0 12px, #0e1116 12px 24px);
  }
  canvas { background: #eef1f6; border: 1px solid var(--border); border-radius: 10px; box-shadow: 0 12px 44px rgba(0,0,0,.55); }
  #side {
    width: 300px; flex-shrink: 0; background: var(--panel);
    border-left: 1px solid var(--border); padding: 14px; overflow-y: auto;
  }
  #side h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin: 0 0 8px; }
  .persona-row { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; cursor: pointer; }
  .persona-row:hover { background: var(--panel-2); }
  .persona-row.sel { background: var(--panel-2); outline: 1px solid var(--accent); }
  .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .persona-name { font-size: 13px; }
  #detail { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
  #detail .who { font-weight: 600; margin-bottom: 4px; }
  #detail .desc { color: var(--muted); font-size: 13px; }
  #detail .addr { color: var(--accent); font-size: 12px; margin-top: 6px; word-break: break-word; }
  .overlay {
    position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    background: rgba(6,9,13,.92); padding: 24px; z-index: 10;
  }
  .overlay .card {
    max-width: 620px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 26px 28px;
  }
  .overlay h2 { margin: 0 0 12px; font-size: 18px; color: var(--accent); }
  .overlay p { color: var(--ink); }
  .overlay code, pre {
    background: #0a0d12; border: 1px solid var(--border); border-radius: 6px;
    padding: 2px 6px; font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 12.5px;
    color: #d6e2ee;
  }
  .overlay pre { display: block; padding: 12px 14px; margin: 10px 0; white-space: pre-wrap; }
  #side section { margin-bottom: 18px; }
  .barrow { display: flex; align-items: center; gap: 8px; margin: 3px 0; font-size: 12px; }
  .barrow .lbl { width: 104px; flex-shrink: 0; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .barrow .track { flex: 1; background: var(--panel-2); border-radius: 4px; height: 15px; overflow: hidden; }
  .barrow .fill { height: 100%; border-radius: 4px; transition: width .25s ease; min-width: 2px; }
  .barrow .num { width: 20px; text-align: right; font-variant-numeric: tabular-nums; }
  .wtlist { max-height: 230px; overflow-y: auto; padding-right: 2px; }
  .wtrow { display: flex; align-items: center; gap: 8px; margin: 2px 0; font-size: 12px; }
  .wtrow .wn { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .wtrow .wtrack { width: 66px; flex-shrink: 0; background: var(--panel-2); border-radius: 4px; height: 9px; overflow: hidden; }
  .wtrow .wfill { height: 100%; background: var(--accent); transition: width .25s ease; }
  .wtrow .wm { width: 40px; text-align: right; color: var(--muted); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>🏥 Hospital Generative Agents</h1>
    <span class="clock" id="clock">—</span>
    <div class="controls">
      <button id="playBtn" title="Play / pause (space)">▶ Play</button>
      <button id="restartBtn" title="Restart">⟲ Restart</button>
      <span class="step-label" id="stepLabel">step 0</span>
      <label for="speed" style="color:var(--muted)">speed</label>
      <select id="speed">
        <option value="0.5">0.5×</option>
        <option value="1" selected>1×</option>
        <option value="2">2×</option>
        <option value="4">4×</option>
        <option value="8">8×</option>
      </select>
    </div>
  </header>
  <main>
    <div id="stage"><canvas id="canvas" width="800" height="400"></canvas></div>
    <aside id="side">
      <section>
        <h2>Patients per department</h2>
        <div id="deptChart"></div>
      </section>
      <section>
        <h2>Waiting time (min)</h2>
        <div class="wtlist" id="waitList"></div>
      </section>
      <h2>Cast</h2>
      <div id="personaList"></div>
      <div id="detail">
        <div class="who">Click a persona</div>
        <div class="desc">Their current action appears here.</div>
        <div class="addr"></div>
      </div>
    </aside>
  </main>
</div>

<div class="overlay" id="overlay">
  <div class="card">
    <h2 id="ovTitle">Replay data not found</h2>
    <div id="ovBody"></div>
  </div>
</div>

<script>
"use strict";
(function () {
  // ---------------------------------------------------------------------- //
  // Constants / state                                                      //
  // ---------------------------------------------------------------------- //
  const MS_PER_STEP = 700;                 // base wall-clock ms per sim step at 1x
  const PALETTE = ["#4ea1ff", "#ff8f6b", "#6bd39a", "#c792ea", "#ffcf5c",
                   "#f06595", "#4dd0c1", "#a3b1c2"]; // fallback persona colors
  // Departments shown in the live bar chart (order matters). "Home / Exit" is
  // intentionally excluded — it is not a department.
  const DEPT_ORDER = ["Admissions", "Waiting Room", "Triage", "General Medicine",
                      "OB / Prenatal Clinic", "Inpatient Ward", "Isolation Unit",
                      "Hospice / Palliative", "Discharge"];

  const state = {
    world: null,
    meta: null,
    master: null,        // raw {step: {persona: entry}}
    frames: [],          // frames[intStep] = {persona: entry} carried-forward
    maxStep: 0,
    baseTime: null,      // Date at metaStep
    metaStep: 0,
    secPerStep: 30,
    tile: 20,
    personaColor: {},    // name -> color
    playhead: 0,         // float step position
    playing: false,
    speed: 1,
    selected: null,
    lastFrameTs: 0,
    patients: [],        // patient persona names (excludes staff + family)
    waitCum: {},         // name -> Float64Array cumulative waiting minutes by step
    sectorColor: {},     // sector -> color (from world.rooms)
    lastChartStep: -1,
  };

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const els = {
    clock: document.getElementById("clock"),
    playBtn: document.getElementById("playBtn"),
    restartBtn: document.getElementById("restartBtn"),
    stepLabel: document.getElementById("stepLabel"),
    speed: document.getElementById("speed"),
    personaList: document.getElementById("personaList"),
    deptChart: document.getElementById("deptChart"),
    waitList: document.getElementById("waitList"),
    detail: document.getElementById("detail"),
    overlay: document.getElementById("overlay"),
    ovTitle: document.getElementById("ovTitle"),
    ovBody: document.getElementById("ovBody"),
  };

  // ---------------------------------------------------------------------- //
  // Data loading                                                           //
  // ---------------------------------------------------------------------- //
  async function fetchJson(name) {
    const res = await fetch(name, { cache: "no-store" });
    if (!res.ok) throw new Error(name + " → HTTP " + res.status);
    return res.json();
  }

  async function boot() {
    // world.json and meta.json are optional-with-fallback; master is required.
    let world = null, meta = null, master = null;
    try { world = await fetchJson("world.json"); } catch (e) { /* fall back below */ }
    try { meta = await fetchJson("meta.json"); } catch (e) { /* fall back below */ }
    try { master = await fetchJson("master_movement.json"); }
    catch (e) { return showMissing(e); }

    state.world = world || defaultWorld(master);
    state.meta = meta || defaultMeta(master);
    state.master = master;
    prepare();
    layout();
    buildPersonaList();
    render();
    requestAnimationFrame(loop);
  }

  function showMissing(err) {
    els.ovTitle.textContent = "Replay data not found";
    els.ovBody.innerHTML =
      "<p><code>master_movement.json</code> could not be loaded (" +
      escapeHtml(String(err && err.message || err)) + ").</p>" +
      "<p>Bake the replay first, then serve this folder:</p>" +
      "<pre>" +
      "# 1) bake the vertical slice (writes world/meta/master_movement)\n" +
      "/Users/georgia/Desktop/synthetic-ambient-fhir-25/.venv/bin/python run_slice.py\n\n" +
      "# 2) serve THIS directory (file:// fetch is blocked)\n" +
      "cd /Users/georgia/Desktop/synthetic-ambient-fhir-25/hospital_gen_agent/web\n" +
      "/Users/georgia/Desktop/synthetic-ambient-fhir-25/.venv/bin/python -m http.server\n\n" +
      "# 3) open  http://localhost:8000/hospital.html" +
      "</pre>";
    els.overlay.style.display = "flex";
  }

  // ---------------------------------------------------------------------- //
  // Fallbacks (keep the replay usable even if world/meta are absent)       //
  // ---------------------------------------------------------------------- //
  function allPersonaNames(master) {
    const set = new Set();
    for (const s of Object.keys(master))
      for (const p of Object.keys(master[s])) set.add(p);
    return Array.from(set);
  }

  function defaultWorld(master) {
    // Infer a bounding grid from movement extents; no rooms/objects.
    let maxX = 8, maxY = 8;
    for (const s of Object.keys(master))
      for (const p of Object.keys(master[s])) {
        const m = master[s][p].movement || [0, 0];
        maxX = Math.max(maxX, m[0]); maxY = Math.max(maxY, m[1]);
      }
    return { tile_size: 24, width: maxX + 2, height: maxY + 2, rooms: [], objects: [] };
  }

  function defaultMeta(master) {
    return {
      start_date: "Unknown date",
      curr_time: "January 01, 2026, 08:00:00",
      sec_per_step: 30,
      persona_names: allPersonaNames(master),
      step: 0,
    };
  }

  // ---------------------------------------------------------------------- //
  // Preprocessing: build carried-forward per-step frames                   //
  // ---------------------------------------------------------------------- //
  function prepare() {
    state.tile = state.world.tile_size || 24;
    state.secPerStep = state.meta.sec_per_step || 30;
    state.metaStep = state.meta.step || 0;
    state.baseTime = parseSimTime(state.meta.curr_time);

    const steps = Object.keys(state.master).map(Number)
      .filter(n => !Number.isNaN(n)).sort((a, b) => a - b);
    state.maxStep = steps.length ? steps[steps.length - 1] : 0;

    // Delta decode: carry forward each persona's last-known entry.
    const running = {};
    const frames = [];
    const rawByStep = {};
    for (const s of steps) rawByStep[s] = state.master[String(s)] || state.master[s];
    for (let s = 0; s <= state.maxStep; s++) {
      const upd = rawByStep[s];
      if (upd) for (const p of Object.keys(upd)) running[p] = upd[p];
      frames[s] = Object.assign({}, running);
    }
    state.frames = frames;

    // Assign a stable color per persona.
    const names = (state.meta.persona_names && state.meta.persona_names.length)
      ? state.meta.persona_names : allPersonaNames(state.master);
    names.forEach((n, i) => { state.personaColor[n] = PALETTE[i % PALETTE.length]; });
    // Cover any persona not listed in meta.
    for (const n of allPersonaNames(state.master))
      if (!(n in state.personaColor))
        state.personaColor[n] = PALETTE[Object.keys(state.personaColor).length % PALETTE.length];

    // Sector -> color from world rooms (for the department bar chart).
    for (const r of (state.world.rooms || []))
      if (r.sector) state.sectorColor[r.sector] = r.color;

    // Patients = personas that are not staff or family.
    state.patients = names.filter(isPatient);

    // Precompute cumulative waiting minutes per patient per step. A step counts
    // as "waiting" when the patient is inside the hospital (not Home/Discharge)
    // and their action mentions waiting. Precomputing keeps rendering smooth.
    const minPerStep = state.secPerStep / 60;
    for (const n of state.patients) {
      const arr = new Float64Array(state.maxStep + 1);
      for (let s = 0; s <= state.maxStep; s++) {
        const prev = s > 0 ? arr[s - 1] : 0;
        const e = state.frames[s] && state.frames[s][n];
        let waiting = false;
        if (e && e.description && /wait/i.test(e.description)) {
          const sec = sectorOf(e);
          waiting = sec !== "Home / Exit" && sec !== "Discharge";
        }
        arr[s] = prev + (waiting ? minPerStep : 0);
      }
      state.waitCum[n] = arr;
    }
  }

  function parseSimTime(str) {
    // Accepts "March 21, 2026, 08:00:00" (DATETIME_FMT). Robust manual parse.
    if (!str) return new Date(2026, 0, 1, 8, 0, 0);
    const m = String(str).match(
      /([A-Za-z]+)\s+(\d{1,2}),\s+(\d{4})(?:,\s+(\d{1,2}):(\d{2}):(\d{2}))?/);
    if (!m) { const d = new Date(str); return isNaN(d) ? new Date(2026,0,1,8,0,0) : d; }
    const months = ["january","february","march","april","may","june","july",
                    "august","september","october","november","december"];
    const mon = months.indexOf(m[1].toLowerCase());
    return new Date(+m[3], mon < 0 ? 0 : mon, +m[2],
                    +(m[4] || 8), +(m[5] || 0), +(m[6] || 0));
  }

  function timeForStep(step) {
    const secs = (step - state.metaStep) * state.secPerStep;
    return new Date(state.baseTime.getTime() + secs * 1000);
  }

  function formatClock(d) {
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const pad = n => String(n).padStart(2, "0");
    return months[d.getMonth()] + " " + d.getDate() + ", " + d.getFullYear() +
      " · " + pad(d.getHours()) + ":" + pad(d.getMinutes()) + ":" + pad(d.getSeconds());
  }

  // ---------------------------------------------------------------------- //
  // Layout / sizing                                                        //
  // ---------------------------------------------------------------------- //
  function layout() {
    const w = (state.world.width || 8) * state.tile;
    const h = (state.world.height || 8) * state.tile;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + "px";
    canvas.style.height = h + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  // ---------------------------------------------------------------------- //
  // Rendering                                                              //
  // ---------------------------------------------------------------------- //
  // Clinical floor-plan palette (light floor, dark UI chrome around it).
  const THEME = {
    floor: "#eef1f6", room: "#ffffff", corridor: "#e3e8f1",
    grid: "rgba(120,140,170,0.10)", wall: "#9aa7bd",
    furn: "#ffffff", furnStroke: "#7f8ca3", screen: "#5b8def",
    screenDark: "#12233f", inkMuted: "#6b7686",
  };

  function line(x1, y1, x2, y2) {
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  }

  function render() {
    const t = state.tile;
    const W = (state.world.width || 8) * t;
    const H = (state.world.height || 8) * t;

    // Floor base + faint tile grid.
    ctx.fillStyle = THEME.floor;
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = THEME.grid; ctx.lineWidth = 1;
    for (let x = 0; x * t <= W; x++) line(x * t, 0, x * t, H);
    for (let y = 0; y * t <= H; y++) line(0, y * t, W, y * t);

    // Circulation corridor connecting every room's doorway.
    drawCorridor(W, t);

    // Rooms: tinted floor, walls with door gaps, and a signage plate.
    for (const r of (state.world.rooms || [])) drawRoom(r, t);

    // Furniture / fixtures as recognizable icons.
    for (const o of (state.world.objects || [])) drawObjectIcon(o, t);

    // Personas (interpolated).
    drawPersonas();
  }

  // ---------------------------------------------------------------------- //
  // Floor plan: corridor, rooms, doorways, signage                         //
  // ---------------------------------------------------------------------- //
  function corridorBand() {
    // The horizontal circulation band between the top and bottom rows of rooms.
    const rowsN = state.world.height || 8;
    let topB = 0, botT = rowsN;
    for (const r of (state.world.rooms || [])) {
      const cy = r.y + r.h / 2;
      if (cy < rowsN / 2) topB = Math.max(topB, r.y + r.h);
      else botT = Math.min(botT, r.y);
    }
    if (!(topB > 0)) topB = Math.floor(rowsN * 0.45);
    if (!(botT < rowsN)) botT = Math.ceil(rowsN * 0.62);
    if (botT <= topB) { topB = Math.floor(rowsN / 2); botT = topB + 1; }
    return { y0: topB, y1: botT };
  }

  function drawCorridor(W, t) {
    const b = corridorBand();
    ctx.fillStyle = THEME.corridor;
    ctx.fillRect(0, b.y0 * t, W, (b.y1 - b.y0) * t);
    // Dashed centre guide, like a floor marking.
    const cy = (b.y0 + (b.y1 - b.y0) / 2) * t;
    ctx.save();
    ctx.strokeStyle = "rgba(120,140,170,0.35)";
    ctx.lineWidth = 2; ctx.setLineDash([t * 0.4, t * 0.4]);
    line(t * 0.5, cy, W - t * 0.5, cy);
    ctx.restore();
  }

  function doorsForRoom(r) {
    // Doorways on this room's corridor-facing wall (tile centres, in tiles).
    const out = [];
    for (const d of (state.world.doors || [])) {
      if (d.x < r.x || d.x > r.x + r.w - 1) continue;
      if (d.y === r.y + r.h) out.push({ edge: "bottom", c: d.x + 0.5 });
      else if (d.y === r.y - 1) out.push({ edge: "top", c: d.x + 0.5 });
    }
    if (!out.length) {  // fallback: one gap on the corridor-facing edge
      const band = corridorBand();
      const edge = (r.y + r.h / 2) < band.y0 ? "bottom" : "top";
      out.push({ edge, c: r.x + r.w / 2 });
    }
    return out;
  }

  function hWall(px0, px1, py, gapsCx, t) {
    // Horizontal wall from px0..px1 at py, skipping a ~1-tile gap at each centre.
    const g = t * 0.5;
    const cuts = gapsCx.map(c => [c * t - g, c * t + g]).sort((a, b) => a[0] - b[0]);
    let x = px0;
    for (const [a, b] of cuts) {
      if (a > x) line(x, py, Math.min(a, px1), py);
      x = Math.max(x, b);
    }
    if (x < px1) line(x, py, px1, py);
  }

  function drawRoom(r, t) {
    const x0 = r.x * t, y0 = r.y * t, x1 = (r.x + r.w) * t, y1 = (r.y + r.h) * t;

    // Interior floor: white, faintly tinted with the department colour.
    ctx.fillStyle = THEME.room; ctx.fillRect(x0, y0, x1 - x0, y1 - y0);
    ctx.fillStyle = withAlpha(r.color || "#889", 0.12);
    ctx.fillRect(x0, y0, x1 - x0, y1 - y0);

    // Walls with real doorways.
    const doors = doorsForRoom(r);
    const topGaps = doors.filter(d => d.edge === "top").map(d => d.c);
    const botGaps = doors.filter(d => d.edge === "bottom").map(d => d.c);
    ctx.strokeStyle = THEME.wall; ctx.lineWidth = 3; ctx.lineCap = "round";
    hWall(x0, x1, y0, topGaps, t);
    hWall(x0, x1, y1, botGaps, t);
    line(x0, y0, x0, y1);
    line(x1, y0, x1, y1);
    ctx.lineCap = "butt";

    // Signage plate.
    const pad = 4, shH = Math.min(t * 0.72, 22);
    ctx.fillStyle = r.color || "#556";
    roundRect(x0 + pad, y0 + pad, (x1 - x0) - 2 * pad, shH, 4); ctx.fill();
    if (r.label) {
      ctx.fillStyle = "#ffffff";
      ctx.font = "700 " + Math.max(10, Math.min(13, t * 0.42)) + "px -apple-system, sans-serif";
      ctx.textAlign = "left"; ctx.textBaseline = "middle";
      ctx.fillText(r.label, x0 + pad + 6, y0 + pad + shH / 2 + 0.5);
    }
  }

  // ---------------------------------------------------------------------- //
  // Furniture icons                                                        //
  // ---------------------------------------------------------------------- //
  function fillRR(x, y, w, h, rad, fill, stroke) {
    roundRect(x, y, w, h, rad);
    ctx.fillStyle = fill || THEME.furn; ctx.fill();
    if (stroke !== null) { ctx.strokeStyle = stroke || THEME.furnStroke; ctx.stroke(); }
  }

  function objType(o) {
    if (o.type) return o.type;
    const n = (o.label || "").toLowerCase();
    if (n.includes("bed")) return "bed";
    if (n.includes("desk")) return "desk";
    if (n.includes("kiosk")) return "kiosk";
    if (n.includes("vitals")) return "vitals";
    if (n.includes("exam table")) return "exam_table";
    if (n.includes("computer")) return "computer";
    if (n.includes("ultrasound")) return "ultrasound";
    if (n.includes("chair")) return "chairs";
    if (n.includes("ppe")) return "ppe";
    if (n.includes("exit")) return "exit";
    if (n === "home") return "home";
    return "generic";
  }

  function drawObjectIcon(o, t) {
    const cx = (o.x + 0.5) * t, cy = (o.y + 0.5) * t, s = t * 0.62;
    const x = cx - s / 2, y = cy - s / 2;

    // Soft ground shadow.
    ctx.beginPath();
    ctx.ellipse(cx, cy + s * 0.42, s * 0.42, s * 0.16, 0, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(30,42,64,0.10)"; ctx.fill();

    ctx.lineWidth = 1.4; ctx.strokeStyle = THEME.furnStroke; ctx.lineCap = "butt";
    switch (objType(o)) {
      case "bed": icoBed(x, y, s); break;
      case "desk": icoDesk(x, y, s); break;
      case "kiosk": icoKiosk(x, y, s); break;
      case "vitals": icoVitals(x, y, s); break;
      case "exam_table": icoExam(x, y, s); break;
      case "computer": icoComputer(x, y, s); break;
      case "ultrasound": icoUltrasound(x, y, s); break;
      case "chairs": icoChair(x, y, s); break;
      case "ppe": icoPPE(x, y, s); break;
      case "exit": icoExit(x, y, s); break;
      case "home": icoHome(x, y, s); break;
      default: fillRR(x + s * 0.2, y + s * 0.2, s * 0.6, s * 0.6, 3);
    }

    // Label under the icon (dark on light, with a white halo).
    if (o.label) {
      ctx.font = Math.max(8, t * 0.3) + "px -apple-system, sans-serif";
      ctx.textAlign = "center"; ctx.textBaseline = "top";
      ctx.lineWidth = 3; ctx.lineJoin = "round";
      ctx.strokeStyle = "rgba(255,255,255,0.85)";
      ctx.strokeText(o.label, cx, cy + s * 0.5);
      ctx.fillStyle = THEME.inkMuted;
      ctx.fillText(o.label, cx, cy + s * 0.5);
    }
  }

  function icoBed(x, y, s) {
    fillRR(x, y + s * 0.12, s, s * 0.76, 3);
    fillRR(x + s * 0.07, y + s * 0.2, s * 0.3, s * 0.6, 2, "#d6e6ff");
    line(x + s * 0.45, y + s * 0.14, x + s * 0.45, y + s * 0.86);
  }
  function icoDesk(x, y, s) {
    fillRR(x, y + s * 0.34, s, s * 0.4, 3);
    line(x, y + s * 0.46, x + s, y + s * 0.46);
  }
  function icoKiosk(x, y, s) {
    fillRR(x + s * 0.42, y + s * 0.5, s * 0.16, s * 0.42, 1, THEME.furnStroke);
    fillRR(x + s * 0.22, y + s * 0.02, s * 0.56, s * 0.5, 3, THEME.screen);
  }
  function icoVitals(x, y, s) {
    fillRR(x + s * 0.14, y + s * 0.02, s * 0.72, s * 0.5, 3, THEME.screenDark);
    ctx.strokeStyle = "#5be0a0"; ctx.lineWidth = 1.6;
    const by = y + s * 0.27;
    ctx.beginPath();
    ctx.moveTo(x + s * 0.2, by); ctx.lineTo(x + s * 0.38, by);
    ctx.lineTo(x + s * 0.46, by - s * 0.14); ctx.lineTo(x + s * 0.54, by + s * 0.12);
    ctx.lineTo(x + s * 0.62, by); ctx.lineTo(x + s * 0.8, by); ctx.stroke();
    ctx.strokeStyle = THEME.furnStroke; ctx.lineWidth = 1.4;
    fillRR(x + s * 0.42, y + s * 0.52, s * 0.16, s * 0.42, 1, THEME.furnStroke);
  }
  function icoExam(x, y, s) {
    fillRR(x, y + s * 0.28, s, s * 0.44, 4);
    fillRR(x + s * 0.03, y + s * 0.3, s * 0.24, s * 0.4, 2, "#d6e6ff");
    line(x + s * 0.2, y + s * 0.72, x + s * 0.2, y + s * 0.9);
    line(x + s * 0.8, y + s * 0.72, x + s * 0.8, y + s * 0.9);
  }
  function icoComputer(x, y, s) {
    fillRR(x + s * 0.12, y + s * 0.06, s * 0.76, s * 0.52, 2, THEME.screen);
    fillRR(x + s * 0.42, y + s * 0.58, s * 0.16, s * 0.18, 1, THEME.furnStroke);
    line(x + s * 0.3, y + s * 0.82, x + s * 0.7, y + s * 0.82);
  }
  function icoUltrasound(x, y, s) {
    fillRR(x + s * 0.08, y + s * 0.08, s * 0.56, s * 0.8, 3);
    fillRR(x + s * 0.14, y + s * 0.14, s * 0.44, s * 0.3, 2, THEME.screen);
    ctx.beginPath(); ctx.arc(x + s * 0.82, y + s * 0.3, s * 0.08, 0, Math.PI * 2);
    ctx.fillStyle = THEME.furn; ctx.fill(); ctx.stroke();
    line(x + s * 0.6, y + s * 0.5, x + s * 0.82, y + s * 0.36);
  }
  function icoChair(x, y, s) {
    fillRR(x + s * 0.26, y + s * 0.4, s * 0.42, s * 0.16, 2);
    fillRR(x + s * 0.26, y + s * 0.14, s * 0.12, s * 0.4, 2);
  }
  function icoPPE(x, y, s) {
    fillRR(x + s * 0.18, y + s * 0.04, s * 0.62, s * 0.88, 2);
    line(x + s * 0.49, y + s * 0.06, x + s * 0.49, y + s * 0.9);
    ctx.fillStyle = "#e05b6a";
    ctx.fillRect(x + s * 0.3, y + s * 0.4, s * 0.08, s * 0.2);
    ctx.fillRect(x + s * 0.24, y + s * 0.46, s * 0.2, s * 0.08);
  }
  function icoExit(x, y, s) {
    fillRR(x + s * 0.16, y + s * 0.02, s * 0.56, s * 0.92, 2, "#2fae6b", "#1f8f55");
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.lineCap = "round";
    const ay = y + s * 0.48;
    ctx.beginPath();
    ctx.moveTo(x + s * 0.3, ay); ctx.lineTo(x + s * 0.6, ay);
    ctx.moveTo(x + s * 0.5, ay - s * 0.1); ctx.lineTo(x + s * 0.62, ay);
    ctx.lineTo(x + s * 0.5, ay + s * 0.1); ctx.stroke();
    ctx.strokeStyle = THEME.furnStroke; ctx.lineWidth = 1.4; ctx.lineCap = "butt";
  }
  function icoHome(x, y, s) {
    ctx.beginPath();
    ctx.moveTo(x + s * 0.5, y + s * 0.05); ctx.lineTo(x + s * 0.95, y + s * 0.45);
    ctx.lineTo(x + s * 0.05, y + s * 0.45); ctx.closePath();
    ctx.fillStyle = "#e08a4a"; ctx.fill();
    ctx.strokeStyle = THEME.furnStroke; ctx.stroke();
    fillRR(x + s * 0.16, y + s * 0.44, s * 0.68, s * 0.5, 2);
    fillRR(x + s * 0.4, y + s * 0.62, s * 0.2, s * 0.32, 1, "#cbd5e6");
  }

  function persMovement(step, name) {
    const f = state.frames[Math.max(0, Math.min(step, state.maxStep))];
    return f ? f[name] : undefined;
  }

  function drawPersonas() {
    const t = state.tile;
    const cur = Math.floor(state.playhead);
    const frac = state.playhead - cur;
    const next = Math.min(cur + 1, state.maxStep);
    const frame = state.frames[Math.min(cur, state.maxStep)] || {};

    // Draw non-selected first, selected + chatting last (on top).
    const names = Object.keys(frame);
    const order = names.slice().sort((a, b) => {
      const ac = (frame[a] && frame[a].chat) ? 1 : 0;
      const bc = (frame[b] && frame[b].chat) ? 1 : 0;
      if (ac !== bc) return ac - bc;
      return (a === state.selected ? 1 : 0) - (b === state.selected ? 1 : 0);
    });

    for (const name of order) {
      const e0 = persMovement(cur, name);
      if (!e0 || !e0.movement) continue;
      const e1 = persMovement(next, name) || e0;
      const p0 = e0.movement, p1 = (e1.movement || p0);
      const tx = (p0[0] + (p1[0] - p0[0]) * frac + 0.5) * t;
      const ty = (p0[1] + (p1[1] - p0[1]) * frac + 0.5) * t;
      const color = state.personaColor[name] || "#8fa";
      const r = Math.max(7, t * 0.30);

      drawPersonToken(tx, ty, r, color, name === state.selected, name);

      // Pronunciatio emoji above head.
      if (e0.pronunciatio) {
        ctx.font = Math.round(r * 1.8) + "px sans-serif";
        ctx.textAlign = "center"; ctx.textBaseline = "alphabetic";
        ctx.fillText(e0.pronunciatio, tx, ty - r - 6);
      }

      // Name label below (dark on the light floor, with a white halo).
      ctx.font = "600 " + Math.max(9, t * 0.4) + "px -apple-system, sans-serif";
      ctx.textAlign = "center"; ctx.textBaseline = "top";
      ctx.lineWidth = 3; ctx.lineJoin = "round";
      ctx.strokeStyle = "rgba(255,255,255,0.92)";
      ctx.strokeText(shortName(name), tx, ty + r + 3);
      ctx.fillStyle = "#243044";
      ctx.fillText(shortName(name), tx, ty + r + 3);

      // Speech bubble for active chat.
      if (e0.chat && e0.chat.length) drawBubble(tx, ty - r - 22, e0.chat);
    }
  }

  function isStaff(name) {
    return /^Dr\.?\b/.test(name) || /^Nurse\b/.test(name) || name === "Rosa Diaz";
  }

  function lighten(hex, amt) {
    let c = String(hex).trim();
    if (c[0] !== "#") return hex;
    if (c.length === 4) c = "#" + c[1] + c[1] + c[2] + c[2] + c[3] + c[3];
    const n = parseInt(c.slice(1), 16);
    let r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
    r = Math.round(r + (255 - r) * amt);
    g = Math.round(g + (255 - g) * amt);
    b = Math.round(b + (255 - b) * amt);
    return "rgb(" + r + "," + g + "," + b + ")";
  }

  function drawCross(x, y, size) {
    const a = size * 0.5, b = size * 0.17;
    ctx.fillStyle = "rgba(255,255,255,0.95)";
    ctx.fillRect(x - b / 2, y - a / 2, b, a);
    ctx.fillRect(x - a / 2, y - b / 2, a, b);
  }

  function drawPersonToken(x, y, r, color, selected, name) {
    // Soft ground shadow.
    ctx.beginPath();
    ctx.ellipse(x, y + r * 0.85, r * 0.95, r * 0.42, 0, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(30,42,64,0.18)"; ctx.fill();

    // Body with a soft highlight so it reads as a rounded token, not a flat dot.
    const g = ctx.createRadialGradient(x - r * 0.3, y - r * 0.4, r * 0.2, x, y, r);
    g.addColorStop(0, lighten(color, 0.4));
    g.addColorStop(1, color);
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = g; ctx.fill();

    if (selected) {
      ctx.lineWidth = 3; ctx.strokeStyle = "#ffffff"; ctx.stroke();
      ctx.beginPath(); ctx.arc(x, y, r + 3, 0, Math.PI * 2);
      ctx.lineWidth = 1.5; ctx.strokeStyle = withAlpha(color, 0.9); ctx.stroke();
    } else {
      ctx.lineWidth = 2; ctx.strokeStyle = "rgba(255,255,255,0.92)"; ctx.stroke();
    }

    // Clinical staff carry a small white medical-cross badge.
    if (isStaff(name)) drawCross(x, y, r * 0.95);
  }

  function drawBubble(x, y, chat) {
    const t = state.tile;
    const lines = chat.slice(-3).map(c => shortName(c[0]) + ": " + c[1]);
    ctx.font = Math.max(10, t * 0.5) + "px sans-serif";
    let bw = 0;
    const wrapped = [];
    const maxW = 220;
    for (const ln of lines) for (const w of wrapText(ln, maxW)) {
      wrapped.push(w); bw = Math.max(bw, ctx.measureText(w).width);
    }
    if (!wrapped.length) return;
    const lh = Math.max(13, t * 0.62);
    const padX = 8, padY = 6;
    const boxW = bw + padX * 2;
    const boxH = wrapped.length * lh + padY * 2;
    let bx = x - boxW / 2;
    let by = y - boxH;
    bx = Math.max(2, Math.min(bx, (state.world.width * t) - boxW - 2));
    by = Math.max(2, by);

    ctx.save();
    ctx.shadowColor = "rgba(30,42,64,0.25)";
    ctx.shadowBlur = 10; ctx.shadowOffsetY = 3;
    ctx.fillStyle = "rgba(255,255,255,0.98)";
    ctx.strokeStyle = "rgba(91,141,239,0.85)";
    ctx.lineWidth = 1.5;
    roundRect(bx, by, boxW, boxH, 8);
    ctx.fill();
    ctx.restore();
    ctx.strokeStyle = "rgba(91,141,239,0.85)"; ctx.lineWidth = 1.5;
    roundRect(bx, by, boxW, boxH, 8); ctx.stroke();
    // Tail.
    ctx.beginPath();
    ctx.moveTo(x - 5, by + boxH);
    ctx.lineTo(x + 5, by + boxH);
    ctx.lineTo(x, by + boxH + 8);
    ctx.closePath(); ctx.fillStyle = "rgba(255,255,255,0.98)"; ctx.fill();

    ctx.textAlign = "left"; ctx.textBaseline = "top";
    ctx.fillStyle = "#233043";
    wrapped.forEach((w, i) => ctx.fillText(w, bx + padX, by + padY + i * lh));
  }

  function wrapText(text, maxW) {
    const words = text.split(" ");
    const out = []; let line = "";
    for (const w of words) {
      const trial = line ? line + " " + w : w;
      if (ctx.measureText(trial).width > maxW && line) { out.push(line); line = w; }
      else line = trial;
    }
    if (line) out.push(line);
    return out;
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // ---------------------------------------------------------------------- //
  // Animation loop                                                         //
  // ---------------------------------------------------------------------- //
  function loop(ts) {
    if (state.playing) {
      if (!state.lastFrameTs) state.lastFrameTs = ts;
      const dt = ts - state.lastFrameTs;
      state.lastFrameTs = ts;
      state.playhead += (dt / MS_PER_STEP) * state.speed;
      if (state.playhead >= state.maxStep) {
        state.playhead = 0;         // loop the replay
      }
    } else {
      state.lastFrameTs = ts;
    }
    render();
    updateHud();
    requestAnimationFrame(loop);
  }

  function updateHud() {
    const step = Math.floor(state.playhead);
    els.clock.textContent = formatClock(timeForStep(step));
    els.stepLabel.textContent = "step " + step + " / " + state.maxStep;
    if (state.selected) updateDetail(state.selected);
    updateCharts(step);
  }

  // ---------------------------------------------------------------------- //
  // Live charts: patients-per-department + per-patient waiting time         //
  // ---------------------------------------------------------------------- //
  function isPatient(name) {
    return !(/^Dr\.?\b/.test(name) || /^Nurse\b/.test(name)
             || name === "Rosa Diaz" || name === "Marcus");
  }

  function sectorOf(entry) {
    if (!entry || !entry.description) return "Home / Exit";
    const at = entry.description.indexOf(" @ ");
    if (at < 0) return "Home / Exit";
    const addr = entry.description.slice(at + 3);
    if (addr.indexOf("General Hospital:") === 0) {
      const parts = addr.split(":");
      return parts[1] || "Home / Exit";
    }
    return "Home / Exit";
  }

  function updateCharts(step) {
    if (step === state.lastChartStep) return;     // only redraw on step change
    state.lastChartStep = step;
    const s = Math.min(step, state.maxStep);
    const frame = state.frames[s] || {};

    // Patients per department (patients only).
    const counts = {};
    for (const d of DEPT_ORDER) counts[d] = 0;
    for (const n of state.patients) {
      const sec = sectorOf(frame[n]);
      if (sec in counts) counts[sec] += 1;
    }
    const maxC = Math.max(1, ...DEPT_ORDER.map(d => counts[d]));
    let html = "";
    for (const d of DEPT_ORDER) {
      const c = counts[d];
      const col = state.sectorColor[d] || "#4ea1ff";
      const pct = Math.round((c / maxC) * 100);
      html += '<div class="barrow"><span class="lbl">' + escapeHtml(d) + "</span>"
        + '<span class="track"><span class="fill" style="width:' + pct
        + "%;background:" + col + '"></span></span>'
        + '<span class="num">' + c + "</span></div>";
    }
    els.deptChart.innerHTML = html;

    // Waiting time per patient (sorted longest first).
    const rows = state.patients.map(n => ({
      n, w: state.waitCum[n] ? state.waitCum[n][s] : 0,
    })).sort((a, b) => b.w - a.w);
    const maxW = Math.max(1, ...rows.map(r => r.w));
    let wh = "";
    for (const row of rows) {
      const pct = Math.round((row.w / maxW) * 100);
      wh += '<div class="wtrow"><span class="wn">' + escapeHtml(row.n) + "</span>"
        + '<span class="wtrack"><span class="wfill" style="width:' + pct + '%"></span></span>'
        + '<span class="wm">' + row.w.toFixed(1) + "</span></div>";
    }
    els.waitList.innerHTML = wh;
  }

  // ---------------------------------------------------------------------- //
  // Sidebar / interaction                                                  //
  // ---------------------------------------------------------------------- //
  function buildPersonaList() {
    const names = (state.meta.persona_names && state.meta.persona_names.length)
      ? state.meta.persona_names : allPersonaNames(state.master);
    els.personaList.innerHTML = "";
    for (const name of names) {
      const row = document.createElement("div");
      row.className = "persona-row";
      row.dataset.name = name;
      const dot = document.createElement("span");
      dot.className = "dot";
      dot.style.background = state.personaColor[name] || "#8fa";
      const label = document.createElement("span");
      label.className = "persona-name";
      label.textContent = name;
      row.appendChild(dot); row.appendChild(label);
      row.addEventListener("click", () => selectPersona(name));
      els.personaList.appendChild(row);
    }
  }

  function selectPersona(name) {
    state.selected = name;
    for (const row of els.personaList.children)
      row.classList.toggle("sel", row.dataset.name === name);
    updateDetail(name);
  }

  function updateDetail(name) {
    const step = Math.floor(state.playhead);
    const e = persMovement(step, name);
    const who = els.detail.querySelector(".who");
    const desc = els.detail.querySelector(".desc");
    const addr = els.detail.querySelector(".addr");
    who.textContent = (e && e.pronunciatio ? e.pronunciatio + " " : "") + name;
    if (!e) { desc.textContent = "(not yet in the scene)"; addr.textContent = ""; return; }
    // description is "action @ world:sector:arena:object" — split for readability.
    const full = e.description || "";
    const at = full.indexOf(" @ ");
    if (at >= 0) {
      desc.textContent = full.slice(0, at);
      addr.textContent = "📍 " + full.slice(at + 3);
    } else {
      desc.textContent = full; addr.textContent = "";
    }
  }

  function canvasClick(ev) {
    const rect = canvas.getBoundingClientRect();
    const mx = ev.clientX - rect.left, my = ev.clientY - rect.top;
    const t = state.tile;
    const step = Math.floor(state.playhead);
    const frame = state.frames[Math.min(step, state.maxStep)] || {};
    let best = null, bestD = 1e9;
    for (const name of Object.keys(frame)) {
      const e = frame[name];
      if (!e || !e.movement) continue;
      const cx = (e.movement[0] + 0.5) * t, cy = (e.movement[1] + 0.5) * t;
      const d = Math.hypot(mx - cx, my - cy);
      if (d < bestD) { bestD = d; best = name; }
    }
    if (best && bestD < Math.max(14, t * 0.9)) selectPersona(best);
  }

  // ---------------------------------------------------------------------- //
  // Controls                                                               //
  // ---------------------------------------------------------------------- //
  function setPlaying(p) {
    state.playing = p;
    state.lastFrameTs = 0;
    els.playBtn.textContent = p ? "⏸ Pause" : "▶ Play";
  }

  els.playBtn.addEventListener("click", () => setPlaying(!state.playing));
  els.restartBtn.addEventListener("click", () => { state.playhead = 0; });
  els.speed.addEventListener("change", () => { state.speed = parseFloat(els.speed.value); });
  canvas.addEventListener("click", canvasClick);
  window.addEventListener("keydown", (e) => {
    if (e.code === "Space") { e.preventDefault(); setPlaying(!state.playing); }
  });

  // ---------------------------------------------------------------------- //
  // Small helpers                                                          //
  // ---------------------------------------------------------------------- //
  function shortName(name) {
    // Keep "Dr. Amari" / "Nurse Reyes" whole; else first name only if long.
    return name;
  }

  function withAlpha(color, a) {
    // Accept #rgb / #rrggbb; return rgba().
    let c = color.trim();
    if (c[0] === "#") {
      if (c.length === 4) c = "#" + c[1] + c[1] + c[2] + c[2] + c[3] + c[3];
      const n = parseInt(c.slice(1), 16);
      const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
      return "rgba(" + r + "," + g + "," + b + "," + a + ")";
    }
    return color; // named colors etc. pass through
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  // Auto-play once loaded.
  boot().then(() => setPlaying(true)).catch(showMissing);
})();
</script>
</body>
</html>
